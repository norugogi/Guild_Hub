<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>고냥</title>
  <style>
    :root {
      --bg: #212121;
      --panel: #2b2b2b;
      --input-bg: #333333;
      --text: #f2f2f2;
      --muted: #bdbdbd;
      --line: #3f3f3f;
      --accent: #64b5f6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", "Segoe UI", sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      min-height: 100dvh;
      margin: 0 auto;
      padding: 16px 12px 24px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      gap: 8px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 10px;
    }

    .box {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      padding: 0 12px;
      outline: none;
    }

    .box:focus {
      border-color: var(--accent);
    }

    .result {
      min-width: 64px;
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      padding: 0 10px;
    }

    .result-final {
      color: #ff5252;
      border-color: #7a2e2e;
      background: #2a1a1a;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 420px) {
      .row {
        grid-template-columns: 1fr auto;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>입력 즉시 계산</h1>

    <section class="row">
      <input id="input1" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result1" class="result">-</output>
      <input id="input1b" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result1b" class="result result-final">-</output>
    </section>

    <section class="row">
      <input id="input2" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result2" class="result">-</output>
      <input id="input2b" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result2b" class="result result-final">-</output>
    </section>

    <section class="row">
      <input id="input3" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result3" class="result">-</output>
      <input id="input3b" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result3b" class="result result-final">-</output>
    </section>

    <section class="row">
      <input id="input4" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result4" class="result">-</output>
      <input id="input4b" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result4b" class="result result-final">-</output>
    </section>

    <section class="row">
      <input id="input5" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result5" class="result">-</output>
      <input id="input5b" class="box" type="number" inputmode="decimal" placeholder="-" />
      <output id="result5b" class="result result-final">-</output>
    </section>

    <p class="hint">계산식: 1차결과 = ROUNDUP(입력값 / (100 * 1), 0), 최종결과 = 1차결과 / 수치2</p>
  </main>

  <script>
    function roundupAwayFromZero(value) {
      if (value > 0) return Math.ceil(value);
      if (value < 0) return Math.floor(value);
      return 0;
    }

    function parseNumberFromInput(id) {
      const raw = document.getElementById(id).value.trim();
      if (raw === "") return null;
      const num = Number(raw);
      return Number.isFinite(num) ? num : null;
    }

    function formatDivision(value) {
      return String(Math.trunc(value));
    }

    function updateRow(index) {
      const firstInputId = "input" + index;
      const firstResultId = "result" + index;
      const secondInputId = "input" + index + "b";
      const secondResultId = "result" + index + "b";

      const firstNumber = parseNumberFromInput(firstInputId);
      const secondNumber = parseNumberFromInput(secondInputId);
      const firstResultEl = document.getElementById(firstResultId);
      const secondResultEl = document.getElementById(secondResultId);

      if (firstNumber === null) {
        firstResultEl.textContent = "-";
        secondResultEl.textContent = "-";
        return;
      }

      const firstCalculated = roundupAwayFromZero(firstNumber / (100 * 1));
      firstResultEl.textContent = String(firstCalculated);

      if (secondNumber === null || secondNumber === 0) {
        secondResultEl.textContent = "-";
        return;
      }

      secondResultEl.textContent = formatDivision(firstCalculated / secondNumber);
    }

    for (let i = 1; i <= 5; i += 1) {
      const firstInputId = "input" + i;
      const firstResultId = "result" + i;
      const secondInputId = "input" + i + "b";
      const secondResultId = "result" + i + "b";

      const firstInput = document.getElementById(firstInputId);
      const secondInput = document.getElementById(secondInputId);

      firstInput.addEventListener("input", function () {
        updateRow(i);
      });

      secondInput.addEventListener("input", function () {
        updateRow(i);
      });

      updateRow(i);
    }
  </script>
</body>
</html>
