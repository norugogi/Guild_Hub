<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Guild Hub</title>

<link rel="stylesheet" href="css/main.css">

</head>

<body>

<!-- 사이드바 -->
<div class="sidebar">

  <div class="menu-title">메인</div>
  <div class="menu-item active" onclick="showPage('mainPage',this)">메인화면</div>

  <div class="menu-title">공지</div>
  <div class="menu-item" onclick="showPage('noticePage',this)">시즌 주요 공지</div>

  <div class="menu-title">결사</div>
  <div class="menu-item" onclick="showPage('guildPage',this)">결사원 리스트</div>

</div>

<!-- 메인 -->
<div class="main">

  <!-- 메인 -->
 <div id="mainPage">

  <!-- 상단 메뉴 -->
  <div class="top-menu clean">
    <div class="top-btn active">대시보드</div>
    <div class="top-btn">결사원 관리</div>
    <div class="top-btn">아이템 분배</div>
    <div class="top-btn">패키지 지원</div>
    <div class="top-btn">공급 관리</div>
    <div class="top-btn">운영 규정</div>
    <div class="top-btn">내정보</div>
  </div>

  <!-- 타이틀 -->
  <div class="page-title">결사 대시보드</div>

  <!-- 카드 영역 -->
  <div class="card-wrap">

    <div class="info-card">
      <span>전체 인원</span>
      <b class="blue">74명</b>
    </div>

    <div class="info-card">
      <span>평균 전투력</span>
      <b class="orange">39,944</b>
    </div>

    <div class="info-card">
      <span>참여율</span>
      <b class="green">45.7%</b>
    </div>

    <div class="info-card">
      <span>기여 점수</span>
      <b class="purple">15,457</b>
    </div>

    <div class="info-card">
      <span>분배 대기</span>
      <b>0건</b>
    </div>

  </div>

  <!-- 하단 2분할 -->
  <div class="dashboard">

    <!-- 왼쪽 통계 -->
    <div class="panel">
      <div class="panel-title">직업 분포</div>

      <div class="bar-row">
        <span>심연추방자</span>
        <div class="bar"><div style="width:20%"></div></div>
        <b>3명</b>
      </div>

      <div class="bar-row">
        <span>주문각인사</span>
        <div class="bar"><div style="width:80%"></div></div>
        <b>23명</b>
      </div>
    </div>

    <!-- 오른쪽 리스트 -->
    <div class="panel">
      <div class="panel-title">주요 아이템</div>
      <ul class="item-list">
        <li>Hermes</li>
        <li>불타는둥지</li>
        <li>새로봄</li>
        <li>설탕</li>
      </ul>
    </div>

  </div>

</div>

<script src="js/main.js"></script>

</body>
</html>
