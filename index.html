<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Guild Hub</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/main.js"></script>
<script src="js/ruby.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 좌측 메뉴 -->
<div class="sidebar">

  <div class="menu-title">메인</div>
  <div class="menu-item active" onclick="showPage('mainPage',this)">메인화면</div>

  <div class="menu-title">공지</div>
  <div class="menu-item" onclick="showPage('noticePage',this)">시즌 주요 공지</div>

  <div class="menu-title">결사</div>
  <div class="menu-item" onclick="showPage('guildListPage',this)">결사원 리스트</div>
  <div class="menu-item" onclick="showPage('guildStatPage',this)">결사 통계</div>

  <div class="menu-title">캐릭터</div>
  <div class="menu-item" onclick="showPage('whoPage',this)">너 누구야</div>

  <div class="menu-title">공헌도</div>
  <div class="menu-item" onclick="showPage('rubyPage',this)">루비 공헌도</div>
  <div class="menu-item" onclick="showPage('ratePage',this)">참여율</div>

  <div class="menu-title">관리자</div>
  <div class="menu-item" onclick="showPage('adminPage',this)">관리자</div>

</div>

<!-- 메인 -->
<div class="main">

  <!-- 메인 -->
  <div id="mainPage">

    <div class="top-menu">
      <div class="top-btn">결사소개</div>
      <div class="top-btn">입찰룰</div>
      <div class="top-btn">참여도</div>
      <div class="top-btn">스펙정보</div>
      <div class="top-btn">참여데이터</div>
      <div class="top-btn">공금시트</div>
      <div class="top-btn">전체서버</div>
    </div>

    <div class="divider"></div>

    <div class="summary">
      <div class="card"><span>DOG</span><b id="dog">-</b></div>
      <div class="card"><span>CAT</span><b id="cat">-</b></div>
      <div class="card"><span>총합</span><b id="total">-</b></div>
      <div class="card"><span>시즌</span><b>농사</b></div>
    </div>

    <div class="stats">
      <div class="box"><div class="title">직업 통계</div><div id="classStats"></div></div>
      <div class="box"><div class="title">토벌 통계</div><div id="gradeStats"></div></div>
      <div class="box"><div class="title">레벨 통계</div><div id="levelStats"></div></div>
    </div>

  </div>

  <!-- 나머지 페이지 동일 유지 -->
  <div id="noticePage" class="page" style="display:none;"></div>
  <div id="guildListPage" class="page" style="display:none;"></div>
  <div id="guildStatPage" class="page" style="display:none;"></div>
  <div id="whoPage" class="page" style="display:none;"></div>
  <div id="rubyPage" class="page" style="display:none;"></div>
  <div id="ratePage" class="page" style="display:none;"></div>
  <div id="adminPage" class="page" style="display:none;"></div>

</div>

<!-- ✅ 추가된 팝업 -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modalTitle"></span>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div id="modalList" class="modal-body"></div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
